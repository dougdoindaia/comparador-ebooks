<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de eBooks: BR x EUA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        input { width: 60%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        
        /* Estilos da grade de livros */
        .grid-livros { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
        .cartao-livro { border: 1px solid #ddd; border-radius: 8px; padding: 10px; width: 150px; cursor: pointer; transition: transform 0.2s; background: #fff; }
        .cartao-livro:hover { transform: scale(1.05); box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-color: #28a745; }
        .cartao-livro img { width: 100%; height: auto; border-radius: 4px; max-height: 200px; object-fit: contain; }
        .cartao-livro h4 { font-size: 0.9em; margin: 10px 0 0 0; color: #333; height: 40px; overflow: hidden; }
        
        #area-resultado, #status { margin-top: 20px; font-size: 1.1em; }
        .resultado-card { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 2px solid #ddd; margin-top: 20px;}
    </style>
</head>
<body>

    <div class="container">
        <h2>📚 Comparador de eBooks Inteligente</h2>
        <p>Busque pelo nome, autor ou cole o código ASIN do Kindle</p>
        
        <input type="text" id="termoBusca" placeholder="Ex: Hábitos Atômicos ou B07VWK2415">
        <button onclick="buscarLista()">Buscar Livros</button>

        <div id="status"></div>
        
        <div id="vitrine" class="grid-livros"></div>

        <div id="area-resultado"></div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const vitrineDiv = document.getElementById('vitrine');
        const resultadoDiv = document.getElementById('area-resultado');

        // ETAPA 1: Busca inteligente (Nome ou ASIN)
        async function buscarLista() {
            // Remove espaços extras antes ou depois do texto
            const termo = document.getElementById('termoBusca').value.trim();
            if (!termo) return;

            // VERIFICAÇÃO INTELIGENTE: É um ASIN? (10 letras/números seguidos)
            const ehAsin = /^[A-Z0-9]{10}$/i.test(termo);
            if (ehAsin) {
                // Pula a vitrine e vai direto para a comparação de preços
                vitrineDiv.innerHTML = "";
                resultadoDiv.innerHTML = "";
                compararPrecos(termo.toUpperCase(), `Pesquisa direta via ASIN: ${termo.toUpperCase()}`);
                return; 
            }

            statusDiv.innerHTML = "⏳ Procurando capas na Amazon...";
            vitrineDiv.innerHTML = "";
            resultadoDiv.innerHTML = "";

            try {
                const resposta = await fetch(`/api/buscar?q=${encodeURIComponent(termo)}`);
                const dados = await resposta.json();

                if (dados.erro) {
                    statusDiv.innerHTML = `<span style='color: orange;'>⚠️ ${dados.erro}</span>`;
                    return;
                }
                if (dados.length === 0) {
                    statusDiv.innerHTML = "<span style='color: red;'>Nenhum livro digital encontrado.</span>";
                    return;
                }

                statusDiv.innerHTML = "Clique na capa do livro para comparar os preços:";
                
                dados.forEach(livro => {
                    const cartao = document.createElement('div');
                    cartao.className = 'cartao-livro';
                    cartao.onclick = () => compararPrecos(livro.asin, livro.titulo);
                    
                    cartao.innerHTML = `
                        <img src="${livro.imagem}" alt="Capa do livro">
                        <h4>${livro.titulo}</h4>
                    `;
                    vitrineDiv.appendChild(cartao);
                });

            } catch (erro) {
                statusDiv.innerHTML = "<span style='color: red;'>Erro de conexão com o servidor.</span>";
            }
        }

        // ETAPA 2: Compara os preços do livro selecionado
        async function compararPrecos(asin, titulo) {
            vitrineDiv.innerHTML = ""; // Esconde as capas
            statusDiv.innerHTML = `⏳ Analisando os preços para: <b>${titulo}</b>...<br><span style="font-size: 0.8em; color: gray;">(Buscando nas lojas do Brasil e EUA)</span>`;

            try {
                const resposta = await fetch(`/api/comparar?asin=${asin}&titulo=${encodeURIComponent(titulo)}`);
                const dados = await resposta.json();

                statusDiv.innerHTML = ""; // Limpa a mensagem de carregando

                if (dados.erro) {
                    resultadoDiv.innerHTML = `<span style='color: orange;'>⚠️ ${dados.erro}</span>`;
                    return;
                }

                resultadoDiv.innerHTML = `
                    <div class="resultado-card">
                        <h3>${dados.livro}</h3>
                        <p>🇧🇷 <b>Brasil:</b> R$ ${dados.preco_brasil_brl}</p>
                        <p>🇺🇸 <b>EUA:</b> U$ ${dados.preco_eua_usd} <span style="font-size: 0.8em; color: #666;">(R$ ${dados.preco_eua_convertido_brl} c/ taxas)</span></p>
                        <hr>
                        <h2 style="color: ${dados.mais_viavel === 'Brasil' ? '#28a745' : '#007bff'};">
                            ✅ Compre na loja do: ${dados.mais_viavel}
                        </h2>
                    </div>
                    <br><button onclick="document.getElementById('termoBusca').value=''; document.getElementById('vitrine').innerHTML=''; document.getElementById('area-resultado').innerHTML=''; document.getElementById('status').innerHTML='';">Fazer Nova Busca</button>
                `;
            } catch (erro) {
                statusDiv.innerHTML = "<span style='color: red;'>Erro ao comparar os preços.</span>";
            }
        }
    </script>

</body>
</html>
